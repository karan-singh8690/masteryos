  /admin/feature-flags/{flag_id}:
    patch:
      tags: [Admin - System]
      summary: Update a feature flag
      operationId: adminUpdateFeatureFlag
      x-command: UpdateFeatureFlag
      parameters:
        - name: flag_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFeatureFlagRequest'
      responses:
        '200':
          description: Updated

  /admin/system-settings:
    get:
      tags: [Admin - System]
      summary: List system settings
      operationId: adminListSystemSettings
      x-query: GetSystemSettings
      responses:
        '200':
          description: Settings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SystemSetting'

  /admin/system-settings/{key}:
    put:
      tags: [Admin - System]
      summary: Update a system setting
      operationId: adminUpdateSystemSetting
      x-command: UpdateSystemSetting
      parameters:
        - name: key
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value: {}
      responses:
        '200':
          description: Updated

  /admin/audit-logs:
    get:
      tags: [Admin - System]
      summary: Search audit logs
      operationId: adminSearchAuditLogs
      x-query: GetAuditLogs
      parameters:
        - name: actor_user_id
          in: query
          schema: { type: string, format: uuid }
        - name: action
          in: query
          schema: { type: string }
        - name: target_type
          in: query
          schema: { type: string }
        - name: target_id
          in: query
          schema: { type: string, format: uuid }
        - name: created_after
          in: query
          schema: { type: string, format: date-time }
        - name: created_before
          in: query
          schema: { type: string, format: date-time }
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Audit logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogList'

  /admin/gdpr-requests:
    get:
      tags: [Admin - System]
      summary: List GDPR requests
      operationId: adminListGDPRRequests
      x-query: GetGDPRRequests
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [pending, processing, completed, rejected] }
      responses:
        '200':
          description: Requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GDPRRequest'

  /admin/gdpr-requests/{request_id}/process:
    post:
      tags: [Admin - System]
      summary: Process a GDPR request
      operationId: adminProcessGDPRRequest
      x-command: ProcessGDPRRequest
      parameters:
        - name: request_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Processed

  # ============================================================
  # ADMIN - ANALYTICS
  # ============================================================
  /admin/analytics/concepts/{concept_id}/statistics:
    get:
      tags: [Admin - Analytics]
      summary: Get concept statistics
      operationId: adminGetConceptStatistics
      x-query: GetConceptStatistics
      parameters:
        - name: concept_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: date_from
          in: query
          schema: { type: string, format: date }
        - name: date_to
          in: query
          schema: { type: string, format: date }
      responses:
        '200':
          description: Statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConceptStatistics'

  /admin/analytics/cohorts/retention:
    get:
      tags: [Admin - Analytics]
      summary: Get cohort retention analytics
      operationId: adminGetCohortRetention
      x-query: GetRetentionAnalytics
      parameters:
        - name: subject_id
          in: query
          schema: { type: string, format: uuid }
        - name: cohort_start
          in: query
          schema: { type: string, format: date }
        - name: cohort_end
          in: query
          schema: { type: string, format: date }
      responses:
        '200':
          description: Retention data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CohortRetention'

  # ============================================================
  # WEBHOOKS (partner-facing)
  # ============================================================
  /webhooks/events:
    get:
      tags: [Webhooks]
      summary: List webhook deliveries (partner)
      operationId: listWebhookDeliveries
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Cursor'
        - name: event_type
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Deliveries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WebhookDelivery'

# ============================================================
# COMPONENTS
# ============================================================
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token. Obtain via /auth/login or /auth/refresh.

  parameters:
    PageSize:
      name: page_size
      in: query
      description: Number of items per page (max 100).
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Cursor:
      name: cursor
      in: query
      description: Opaque pagination cursor from the previous response.
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      description: Client-generated UUID for safe retries. Server caches results for 24h.
      schema:
        type: string
        format: uuid
    SubjectId:
      name: subject_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    EnrollmentId:
      name: enrollment_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    SessionId:
      name: session_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    SessionIdPath:
      name: session_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    UserIdPath:
      name: user_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    OAuthProvider:
      name: provider
      in: path
      required: true
      schema: { type: string, enum: [google, github] }

  responses:
    Unauthorized:
      description: Authentication missing or invalid.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Authenticated but not authorized.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Conflict:
      description: Request conflicts with current state.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    ValidationError:
      description: Semantic validation failure.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    RateLimited:
      description: Rate limit exceeded.
      headers:
        Retry-After:
          schema: { type: integer, description: Seconds to wait before retrying. }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    PaymentRequired:
      description: Payment required or failed.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    ServiceUnavailable:
      description: Service temporarily unavailable.
      headers:
        Retry-After:
          schema: { type: integer }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    # ---------- Common ----------
    Error:
      type: object
      required: [code, message, correlation_id]
      properties:
        code:
          type: string
          description: SCREAMING_SNAKE_CASE error code.
          example: EMAIL_ALREADY_REGISTERED
        message:
          type: string
          description: Human-readable message.
        details:
          type: object
          description: Field-level validation errors or additional context.
          additionalProperties: true
        correlation_id:
          type: string
          format: uuid
          description: For support and log tracing.
        timestamp:
          type: string
          format: date-time
        doc_url:
          type: string
          format: uri
          description: Link to error documentation.
        retry_after:
          type: integer
          description: Seconds to wait before retrying (for rate limits).

    Pagination:
      type: object
      properties:
        cursor:
          type: string
          nullable: true
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean
        total_count:
          type: integer
          nullable: true

    # ---------- Auth ----------
    RegisterRequest:
      type: object
      required: [email, password, display_name]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 12, description: Strong password. }
        display_name: { type: string, maxLength: 100 }
        timezone: { type: string, default: UTC, description: IANA timezone. }
        locale: { type: string, default: en-US }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
        mfa_code: { type: string, pattern: '^\d{6}$', description: Required if MFA enabled. }

    OAuthLoginRequest:
      type: object
      required: [code]
      properties:
        code: { type: string, description: OAuth authorization code. }
        redirect_uri: { type: string, format: uri }

    AuthResponse:
      type: object
      properties:
        access_token: { type: string }
        expires_in: { type: integer, description: Seconds until access token expires. }
        user:
          $ref: '#/components/schemas/User'

    RefreshResponse:
      type: object
      properties:
        access_token: { type: string }
        expires_in: { type: integer }

    # ---------- Users ----------
    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        status: { type: string, enum: [pending_verification, active, suspended, deactivated, pending_deletion, anonymized] }
        mfa_enabled: { type: boolean }
        email_verified_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    UserWithProfile:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          properties:
            profile:
              $ref: '#/components/schemas/Profile'

    Profile:
      type: object
      properties:
        display_name: { type: string }
        timezone: { type: string }
        locale: { type: string }
        avatar_url: { type: string, nullable: true }
        preferences: { type: object, additionalProperties: true }

    UpdateProfileRequest:
      type: object
      properties:
        display_name: { type: string, maxLength: 100 }
        timezone: { type: string }
        locale: { type: string }
        avatar_url: { type: string }
        preferences: { type: object, additionalProperties: true }

    Session:
      type: object
      properties:
        id: { type: string, format: uuid }
        device_fingerprint: { type: string, nullable: true }
        last_ip: { type: string, nullable: true }
        user_agent: { type: string, nullable: true }
        expires_at: { type: string, format: date-time }
        last_seen_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }

    # ---------- Enrollments ----------
    Enrollment:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        subject_id: { type: string, format: uuid }
        learning_path_id: { type: string, format: uuid, nullable: true }
        status: { type: string, enum: [pending_onboarding, active, dormant, unenrolled] }
        enrolled_at: { type: string, format: date-time }
        onboarded_at: { type: string, format: date-time, nullable: true }
        last_active_at: { type: string, format: date-time, nullable: true }

    EnrollmentList:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Enrollment' }
        pagination: { $ref: '#/components/schemas/Pagination' }

    LearningGoal:
      type: object
      properties:
        id: { type: string, format: uuid }
        goal_type: { type: string, enum: [interview_date, daily_commitment, session_intent, mastery_target] }
        target_date: { type: string, format: date, nullable: true }
        parameters: { type: object }
        status: { type: string, enum: [active, completed, abandoned] }
        created_at: { type: string, format: date-time }

    SetLearningGoalRequest:
      type: object
      required: [goal_type]
      properties:
        goal_type: { type: string, enum: [interview_date, daily_commitment, session_intent, mastery_target] }
        target_date: { type: string, format: date }
        parameters: { type: object }

    StudyPlan:
      type: object
      properties:
        id: { type: string, format: uuid }
        projected_graduation_date: { type: string, format: date, nullable: true }
        weekly_schedule: { type: object }
        feasibility_status: { type: string, enum: [feasible, at_risk, infeasible] }
        generated_at: { type: string, format: date-time }

    # ---------- Subjects, Concepts ----------
    Subject:
      type: object
      properties:
        id: { type: string, format: uuid }
        code: { type: string }
        name: { type: string }
        slug: { type: string }
        description: { type: string, nullable: true }
        status: { type: string, enum: [draft, published, deprecated] }
        published_at: { type: string, format: date-time, nullable: true }

    CreateSubjectRequest:
      type: object
      required: [code, name, slug]
      properties:
        code: { type: string }
        name: { type: string }
        slug: { type: string }
        description: { type: string }

    LearningPath:
      type: object
      properties:
        id: { type: string, format: uuid }
        subject_id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string, nullable: true }
        graduation_criteria: { type: object }
        estimated_duration_hours: { type: integer, nullable: true }
        status: { type: string, enum: [draft, published, deprecated] }
        items:
          type: array
          description: Ordered concept list (only present when expanded).
          items:
            type: object
            properties:
              position: { type: integer }
              concept_id: { type: string, format: uuid }
              is_optional: { type: boolean }

    Concept:
      type: object
      properties:
        id: { type: string, format: uuid }
        subject_id: { type: string, format: uuid }
        slug: { type: string }
        name: { type: string }
        description: { type: string }
        difficulty: { type: string, enum: [easy, medium, hard] }
        importance: { type: string, enum: [low, medium, high] }
        status: { type: string, enum: [draft, published, deprecated] }
        objectives:
          type: array
          description: Only present when expanded.
          items: { $ref: '#/components/schemas/LearningObjective' }
        misconceptions:
          type: array
          description: Only present when expanded.
          items: { $ref: '#/components/schemas/Misconception' }

    ConceptList:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Concept' }
        pagination: { $ref: '#/components/schemas/Pagination' }

    CreateConceptRequest:
      type: object
      required: [slug, name, description]
      properties:
        slug: { type: string }
        name: { type: string }
        description: { type: string }
        difficulty: { type: string, enum: [easy, medium, hard], default: medium }
        importance: { type: string, enum: [low, medium, high], default: medium }

    UpdateConceptRequest:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        difficulty: { type: string, enum: [easy, medium, hard] }
        importance: { type: string, enum: [low, medium, high] }

    LearningObjective:
      type: object
      properties:
        id: { type: string, format: uuid }
        concept_id: { type: string, format: uuid }
        statement: { type: string }
        status: { type: string, enum: [draft, published, deprecated] }

    Misconception:
      type: object
      properties:
        id: { type: string, format: uuid }
        learning_objective_id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        remediation: { type: string, nullable: true }
        status: { type: string, enum: [draft, published, deprecated] }

    CreateMisconceptionRequest:
      type: object
      required: [name, description]
      properties:
        name: { type: string }
        description: { type: string }
        remediation: { type: string }

    # ---------- Question Templates ----------
    QuestionTemplate:
      type: object
      properties:
        id: { type: string, format: uuid }
        subject_id: { type: string, format: uuid }
        code: { type: string }
        question_type: { type: string, enum: [multiple_choice, code_execution, free_response] }
        status: { type: string, enum: [draft, in_review, published, deprecated] }
        current_version_id: { type: string, format: uuid, nullable: true }

    CreateQuestionTemplateRequest:
      type: object
      required: [code, question_type, parameter_schema, prompt_template]
      properties:
        code: { type: string }
        question_type: { type: string, enum: [multiple_choice, code_execution, free_response] }
        parameter_schema: { type: object, description: JSON Schema for parameters. }
        prompt_template: { type: object }
        correct_answer_generator: { type: object }
        distractor_generator: { type: object, nullable: true }
        explanation_template: { type: object }
        difficulty_estimate: { type: string, enum: [easy, medium, hard] }

    UpdateQuestionTemplateRequest:
      type: object
      properties:
        parameter_schema: { type: object }
        prompt_template: { type: object }
        correct_answer_generator: { type: object }
        distractor_generator: { type: object }
        explanation_template: { type: object }
        difficulty_estimate: { type: string, enum: [easy, medium, hard] }

    # ---------- Study Sessions & Queues ----------
    StartSessionRequest:
      type: object
      required: [enrollment_id, intent]
      properties:
        enrollment_id: { type: string, format: uuid }
        intent: { type: string, enum: [drill, diagnostic, review, mixed] }
        target_question_count: { type: integer, minimum: 1, maximum: 50 }

    StudySession:
      type: object
      properties:
        id: { type: string, format: uuid }
        learner_enrollment_id: { type: string, format: uuid }
        intent: { type: string, enum: [drill, diagnostic, review, mixed] }
        status: { type: string, enum: [active, paused, ended, abandoned] }
        started_at: { type: string, format: date-time }
        ended_at: { type: string, format: date-time, nullable: true }
        question_count: { type: integer }

    StudySessionWithQueue:
      allOf:
        - $ref: '#/components/schemas/StudySession'
        - type: object
          properties:
            queue:
              $ref: '#/components/schemas/AdaptiveQueue'

    AdaptiveQueue:
      type: object
      properties:
        study_session_id: { type: string, format: uuid }
        current_position: { type: integer }
        questions:
          type: array
          items: { $ref: '#/components/schemas/QuestionInstance' }

    DailyQueue:
      type: object
      properties:
        learner_enrollment_id: { type: string, format: uuid }
        queue_date: { type: string, format: date }
        questions:
          type: array
          items: { $ref: '#/components/schemas/QuestionInstance' }
        completed_count: { type: integer }

    # ---------- Attempts ----------
    QuestionInstance:
      type: object
      properties:
        id: { type: string, format: uuid }
        template_version_id: { type: string, format: uuid }
        rendered_prompt: { type: object }
        rendered_choices: { type: array, nullable: true, items: { type: object } }
        served_at: { type: string, format: date-time }
        status: { type: string, enum: [served, answered, abandoned] }

    SubmitAnswerRequest:
      type: object
      required: [question_instance_id, answer]
      properties:
        question_instance_id: { type: string, format: uuid }
        answer:
          type: object
          description: Answer payload; shape depends on question type.
          properties:
            answer_type: { type: string, enum: [multiple_choice, code, free_response] }
            submitted_answer: {}
            execution_result: { type: object, nullable: true }

    AttemptResult:
      type: object
      properties:
        attempt_id: { type: string, format: uuid }
        scoring_outcome: { type: string, enum: [correct, incorrect, partial] }
        partial_credit: { type: number, nullable: true }
        explanation:
          type: object
          properties:
            content: { type: string }
            outcome_key: { type: string }
        next_question:
          $ref: '#/components/schemas/QuestionInstance'
          nullable: true
        updated_mastery:
          $ref: '#/components/schemas/MasteryScore'
          nullable: true
          description: Updated mastery for the tested concept (may be null if async).

    Attempt:
      type: object
      properties:
        id: { type: string, format: uuid }
        question_instance_id: { type: string, format: uuid }
        learner_enrollment_id: { type: string, format: uuid }
        scoring_outcome: { type: string, enum: [correct, incorrect, partial] }
        time_to_answer_ms: { type: integer }
        hint_used: { type: boolean }
        misconception_id: { type: string, format: uuid, nullable: true }
        attempt_intent: { type: string, enum: [practice, review, diagnostic] }
        created_at: { type: string, format: date-time }

    AttemptList:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Attempt' }
        pagination: { $ref: '#/components/schemas/Pagination' }

    CodeExecutionResult:
      type: object
      properties:
        success: { type: boolean }
        pass_count: { type: integer }
        fail_count: { type: integer }
        output: { type: string }
        execution_time_ms: { type: integer }

    SessionAnalytics:
      type: object
      properties:
        study_session_id: { type: string, format: uuid }
        question_count: { type: integer }
        success_rate: { type: number }
        mastery_delta: { type: number }
        duration_seconds: { type: integer }
        concepts_covered:
          type: array
          items: { type: string, format: uuid }

    # ---------- Mastery ----------
    MasteryScore:
      type: object
      properties:
        id: { type: string, format: uuid }
        learner_enrollment_id: { type: string, format: uuid }
        concept_id: { type: string, format: uuid }
        memory_score: { type: number, format: float, minimum: 0, maximum: 1 }
        durable_mastery_score: { type: number, format: float, minimum: 0, maximum: 1 }
        mastery_score_combined: { type: number, format: float, minimum: 0, maximum: 1 }
        confidence_interval: { type: number, format: float }
        evidence_count: { type: integer }
        concept_state: { type: string, enum: [unseen, novice, developing, proficient, mastered, decayed] }
        weakness_severity: { type: string, enum: [none, mild, moderate, severe] }
        last_attempt_at: { type: string, format: date-time, nullable: true }
        last_updated_at: { type: string, format: date-time }

    Review:
      type: object
      properties:
        id: { type: string, format: uuid }
        learner_enrollment_id: { type: string, format: uuid }
        concept_id: { type: string, format: uuid }
        due_at: { type: string, format: date-time }
        priority: { type: string, enum: [low, medium, high] }
        review_interval: { type: string, description: ISO 8601 duration. }
        last_reviewed_at: { type: string, format: date-time, nullable: true }

    # ---------- Recommendations, Achievements ----------
    Recommendation:
      type: object
      properties:
        id: { type: string, format: uuid }
        learner_enrollment_id: { type: string, format: uuid }
        recommendation_type: { type: string }
        payload: { type: object }
        recommendation_score: { type: number, format: float, minimum: 0, maximum: 1 }
        status: { type: string, enum: [pending, presented, accepted, deferred, dismissed] }
        created_at: { type: string, format: date-time }

    Achievement:
      type: object
      properties:
        id: { type: string, format: uuid }
        learner_enrollment_id: { type: string, format: uuid }
        achievement_type_id: { type: string, format: uuid }
        achievement_type_code: { type: string }
        name: { type: string }
        category: { type: string, enum: [milestone, graduation, streak, special] }
        criteria_snapshot: { type: object }
        awarded_at: { type: string, format: date-time }

    Streak:
      type: object
      properties:
        learner_enrollment_id: { type: string, format: uuid }
        current_streak: { type: integer }
        longest_streak: { type: integer }
        last_study_date: { type: string, format: date, nullable: true }

    # ---------- Dashboard, Progress ----------
    Dashboard:
      type: object
      properties:
        recommended_next_action:
          type: object
          properties:
            action_type: { type: string, enum: [start_session, review_due, drill_weak, diagnostic] }
            label: { type: string }
            enrollment_id: { type: string, format: uuid }
        streak:
          $ref: '#/components/schemas/Streak'
        weak_concepts:
          type: array
          items: { $ref: '#/components/schemas/MasteryScore' }
        subjects:
          type: array
          items:
            type: object
            properties:
              enrollment_id: { type: string, format: uuid }
              subject: { $ref: '#/components/schemas/Subject' }
              interview_readiness: { type: number }

    Progress:
      type: object
      properties:
        mastery_over_time:
          type: array
          items:
            type: object
            properties:
              date: { type: string, format: date }
              avg_mastery: { type: number }
        concept_state_distribution:
          type: object
          additionalProperties: { type: integer }
        learning_velocity:
          type: object
          properties:
            concepts_per_week: { type: number }
            trend: { type: string, enum: [increasing, stable, decreasing] }
        retention:
          type: object
          properties:
            retention_30d: { type: number }
            retention_90d: { type: number }

    InterviewReadiness:
      type: object
      properties:
        readiness_score: { type: number, format: float, minimum: 0, maximum: 1 }
        confidence_interval: { type: number }
        breakdown:
          type: object
          properties:
            mastery_distribution: { type: object }
            retention: { type: number }
            interview_question_performance: { type: number }

    # ---------- Notifications ----------
    Notification:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        notification_type: { type: string }
        channel: { type: string, enum: [email, push, in_app] }
        payload: { type: object }
        status: { type: string, enum: [queued, sent, delivered, opened, dismissed] }
        created_at: { type: string, format: date-time }

    NotificationList:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Notification' }
        pagination: { $ref: '#/components/schemas/Pagination' }

    # ---------- Billing ----------
    BillingPlan:
      type: object
      properties:
        id: { type: string, format: uuid }
        code: { type: string }
        name: { type: string }
        price_cents: { type: integer }
        currency: { type: string }
        billing_period: { type: string, enum: [monthly, annual] }
        entitlements: { type: object }
        is_active: { type: boolean }

    Subscription:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        billing_plan: { $ref: '#/components/schemas/BillingPlan' }
        status: { type: string, enum: [active, past_due, canceled, expired] }
        current_period_start: { type: string, format: date }
        current_period_end: { type: string, format: date }
        canceled_at: { type: string, format: date, nullable: true }

    Invoice:
      type: object
      properties:
        id: { type: string, format: uuid }
        subscription_id: { type: string, format: uuid }
        amount_cents: { type: integer }
        currency: { type: string }
        status: { type: string, enum: [pending, paid, failed, refunded] }
        issued_at: { type: string, format: date }
        paid_at: { type: string, format: date, nullable: true }

    # ---------- Search ----------
    SearchResults:
      type: object
      properties:
        concepts:
          type: array
          items: { $ref: '#/components/schemas/Concept' }
        templates:
          type: array
          items: { $ref: '#/components/schemas/QuestionTemplate' }
        pagination: { $ref: '#/components/schemas/Pagination' }

    # ---------- Admin ----------
    AdminUserList:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/User' }
        pagination: { $ref: '#/components/schemas/Pagination' }

    ContentVersion:
      type: object
      properties:
        id: { type: string, format: uuid }
        subject_id: { type: string, format: uuid }
        version_number: { type: integer }
        status: { type: string, enum: [active, deprecated] }
        changelog: { type: string, nullable: true }
        published_at: { type: string, format: date-time }

    AlgorithmVersion:
      type: object
      properties:
        id: { type: string, format: uuid }
        version_number: { type: integer }
        name: { type: string }
        description: { type: string, nullable: true }
        parameters: { type: object }
        changelog: { type: string, nullable: true }
        is_active: { type: boolean }
        promoted_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    FeatureFlag:
      type: object
      properties:
        id: { type: string, format: uuid }
        key: { type: string }
        description: { type: string }
        targeting_rules: { type: object }
        default_value: {}
        is_active: { type: boolean }
        owner: { type: string }

    CreateFeatureFlagRequest:
      type: object
      required: [key, description, owner]
      properties:
        key: { type: string }
        description: { type: string }
        targeting_rules: { type: object }
        default_value: {}
        owner: { type: string }
        retirement_plan: { type: string }

    UpdateFeatureFlagRequest:
      type: object
      properties:
        description: { type: string }
        targeting_rules: { type: object }
        default_value: {}
        is_active: { type: boolean }

    SystemSetting:
      type: object
      properties:
        key: { type: string }
        value_type: { type: string, enum: [integer, string, boolean, json] }
        value: {}
        description: { type: string, nullable: true }

    AuditLog:
      type: object
      properties:
        id: { type: string, format: uuid }
        actor_user_id: { type: string, format: uuid, nullable: true }
        action: { type: string }
        target_type: { type: string }
        target_id: { type: string, format: uuid, nullable: true }
        metadata: { type: object }
        actor_ip: { type: string, nullable: true }
        outcome: { type: string, enum: [success, failure] }
        created_at: { type: string, format: date-time }

    AuditLogList:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/AuditLog' }
        pagination: { $ref: '#/components/schemas/Pagination' }

    GDPRRequest:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        request_type: { type: string, enum: [access, erasure, portability] }
        status: { type: string, enum: [pending, processing, completed, rejected] }
        requested_at: { type: string, format: date-time }
        due_at: { type: string, format: date }
        completed_at: { type: string, format: date-time, nullable: true }

    # ---------- Analytics ----------
    ConceptStatistics:
      type: object
      properties:
        concept_id: { type: string, format: uuid }
        avg_mastery_score: { type: number, nullable: true }
        success_rate: { type: number, nullable: true }
        median_time_to_mastery_days: { type: number, nullable: true }
        retention_30d: { type: number, nullable: true }
        learner_count: { type: integer }
        attempt_count: { type: integer }

    CohortRetention:
      type: object
      properties:
        cohort_size: { type: integer }
        retention_curves:
          type: array
          items:
            type: object
            properties:
              days: { type: integer }
              retention: { type: number }

    # ---------- Webhooks ----------
    WebhookDelivery:
      type: object
      properties:
        id: { type: string, format: uuid }
        event_type: { type: string }
        payload: { type: object }
        status: { type: string, enum: [delivered, failed] }
        delivered_at: { type: string, format: date-time, nullable: true }
        attempt_count: { type: integer }

    # ---------- Content Packs ----------
    SubmitContentPackRequest:
      type: object
      required: [subject_id, name, artifact_ids]
      properties:
        subject_id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        artifact_ids:
          type: object
          description: Map of artifact type to IDs.
          properties:
            concepts: { type: array, items: { type: string, format: uuid } }
            learning_objectives: { type: array, items: { type: string, format: uuid } }
            misconceptions: { type: array, items: { type: string, format: uuid } }
            question_templates: { type: array, items: { type: string, format: uuid } }
