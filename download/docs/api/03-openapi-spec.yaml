openapi: 3.1.0
info:
  title: Mastery Engine API
  version: 1.0.0
  description: |
    The Mastery Engine API is the public and internal API surface for the Mastery Engine
    adaptive learning platform.

    This contract is the single source of truth for the API. Backend engineers implement
    to it; frontend engineers build against it; SDK authors generate from it.

    ## Conventions
    - All timestamps are ISO 8601 with timezone (e.g., `2026-07-02T14:30:00Z`).
    - All IDs are UUIDs (v7, time-ordered).
    - Field names are `snake_case`.
    - Errors use a standardized error object with `code`, `message`, `details`, `correlation_id`.
    - Write operations support `Idempotency-Key` header for safe retries.
    - Collections use cursor-based pagination.

    ## Authentication
    - JWT access tokens in `Authorization: Bearer <token>` header.
    - Refresh tokens in HttpOnly cookies.
    - OAuth (Google, GitHub) and MFA (TOTP) supported.

    ## Versioning
    - URI versioned: `/api/v1/...`.
    - Breaking changes require a new major version.
  contact:
    name: Mastery Engine API Team
    email: api@masteryengine.com
    url: https://docs.masteryengine.com
  license:
    name: Proprietary
    url: https://masteryengine.com/license

servers:
  - url: https://api.masteryengine.com/api/v1
    description: Production
  - url: https://staging-api.masteryengine.com/api/v1
    description: Staging
  - url: http://localhost:8000/api/v1
    description: Local development

security:
  - BearerAuth: []

tags:
  - name: Authentication
    description: User registration, login, logout, token refresh, OAuth, MFA.
  - name: Users
    description: User identity and profile.
  - name: Enrollments
    description: Learner enrollments in subjects.
  - name: Subjects
    description: Curriculum units (Python, SQL, etc.).
  - name: Learning Paths
    description: Ordered concept traversals within a subject.
  - name: Concepts
    description: Atomic knowledge units.
  - name: Question Templates
    description: Parameterized question specifications.
  - name: Study Sessions
    description: Single practice sittings.
  - name: Adaptive Queues
    description: Session-scoped question queues.
  - name: Attempts
    description: Atomic learning evidence.
  - name: Mastery Scores
    description: Per-concept mastery estimates.
  - name: Reviews
    description: Scheduled spaced-repetition encounters.
  - name: Recommendations
    description: Advisory learning suggestions.
  - name: Achievements
    description: Earned recognitions (includes milestones).
  - name: Dashboard
    description: Aggregated landing data.
  - name: Progress
    description: Mastery-over-time and retention analytics.
  - name: Notifications
    description: User notifications.
  - name: Billing
    description: Subscriptions, plans, invoices.
  - name: Search
    description: Cross-resource search.
  - name: Admin - Users
    description: User management (admin).
  - name: Admin - Content
    description: Content authoring, review, publishing.
  - name: Admin - Algorithm
    description: Algorithm version management.
  - name: Admin - System
    description: Feature flags, settings, audit logs, GDPR.
  - name: Admin - Analytics
    description: Aggregate analytics.
  - name: Webhooks
    description: Webhook contracts for partner integrations.

paths:
  # ============================================================
  # AUTHENTICATION
  # ============================================================
  /auth/register:
    post:
      tags: [Authentication]
      summary: Register a new user
      description: Creates a new user account with email/password. Sends verification email.
      operationId: registerUser
      x-command: RegisterUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              default:
                value:
                  email: alex@example.com
                  password: SecurePass123!
                  display_name: Alex Chen
                  timezone: Asia/Kolkata
      responses:
        '201':
          description: User created
          headers:
            Location:
              schema: { type: string }
              description: URL of the new user resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/login:
    post:
      tags: [Authentication]
      summary: Login with email/password
      operationId: loginUser
      x-command: LoginUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          headers:
            Set-Cookie:
              schema: { type: string }
              description: HttpOnly refresh token cookie.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/oauth/{provider}/login:
    post:
      tags: [Authentication]
      summary: Login or register via OAuth
      operationId: loginWithOAuth
      x-command: LoginWithOAuth
      security: []
      parameters:
        - $ref: '#/components/parameters/OAuthProvider'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthLoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [Authentication]
      summary: Refresh access token
      operationId: refreshToken
      x-command: RefreshToken
      security: []
      description: Uses the refresh token from the HttpOnly cookie. Rotates the refresh token.
      responses:
        '200':
          description: New access token
          headers:
            Set-Cookie:
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Authentication]
      summary: Logout (revoke current session)
      operationId: logoutUser
      x-command: LogoutUser
      responses:
        '204':
          description: Logged out
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/verify-email:
    post:
      tags: [Authentication]
      summary: Verify email address
      operationId: verifyEmail
      x-command: VerifyEmail
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string }
      responses:
        '200':
          description: Email verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'

  /auth/password-reset/request:
    post:
      tags: [Authentication]
      summary: Request password reset email
      operationId: requestPasswordReset
      x-command: RequestPasswordReset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '202':
          description: Request accepted (always, to prevent email enumeration)

  /auth/password-reset/confirm:
    post:
      tags: [Authentication]
      summary: Reset password with token
      operationId: resetPassword
      x-command: ResetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, new_password]
              properties:
                token: { type: string }
                new_password: { type: string, minLength: 12 }
      responses:
        '200':
          description: Password reset
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/mfa/enable:
    post:
      tags: [Authentication]
      summary: Enable MFA (TOTP)
      operationId: enableMFA
      x-command: EnableMFA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [totp_code]
              properties:
                totp_code: { type: string, pattern: '^\d{6}$' }
      responses:
        '200':
          description: MFA enabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  backup_codes:
                    type: array
                    items: { type: string }
        '409':
          $ref: '#/components/responses/Conflict'

  /auth/mfa/disable:
    post:
      tags: [Authentication]
      summary: Disable MFA
      operationId: disableMFA
      x-command: DisableMFA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [verification]
              properties:
                verification: { type: string, description: Password or TOTP code }
      responses:
        '204':
          description: MFA disabled
        '403':
          $ref: '#/components/responses/Forbidden'

  /auth/sessions:
    get:
      tags: [Authentication]
      summary: List active sessions
      operationId: getUserSessions
      x-query: GetUserSessions
      responses:
        '200':
          description: Active sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Session'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/sessions/{session_id}/revoke:
    post:
      tags: [Authentication]
      summary: Revoke a session
      operationId: revokeSession
      x-command: RevokeSession
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '204':
          description: Session revoked
        '404':
          $ref: '#/components/responses/NotFound'

  /auth/sessions/revoke-all:
    post:
      tags: [Authentication]
      summary: Revoke all sessions (log out everywhere)
      operationId: revokeAllSessions
      x-command: RevokeAllSessions
      responses:
        '204':
          description: All sessions revoked

  # ============================================================
  # USERS & PROFILES
  # ============================================================
  /users/me:
    get:
      tags: [Users]
      summary: Get current user
      operationId: getCurrentUser
      x-query: GetUser
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWithProfile'
    patch:
      tags: [Users]
      summary: Update current user's profile
      operationId: updateCurrentUser
      x-command: UpdateUserProfile
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWithProfile'
        '422':
          $ref: '#/components/responses/ValidationError'

  /users/me/deletion:
    post:
      tags: [Users]
      summary: Request account deletion (GDPR)
      operationId: requestAccountDeletion
      x-command: RequestAccountDeletion
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirm_email]
              properties:
                confirm_email: { type: string, format: email }
      responses:
        '202':
          description: Deletion requested (14-day grace period)
          content:
            application/json:
              schema:
                type: object
                properties:
                  scheduled_anonymization_at: { type: string, format: date-time }

  /users/me/deletion/cancel:
    post:
      tags: [Users]
      summary: Cancel pending account deletion
      operationId: cancelAccountDeletion
      x-command: CancelAccountDeletion
      responses:
        '200':
          description: Deletion cancelled
        '409':
          $ref: '#/components/responses/Conflict'

  # ============================================================
  # ENROLLMENTS
  # ============================================================
  /enrollments:
    get:
      tags: [Enrollments]
      summary: List my enrollments
      operationId: listMyEnrollments
      x-query: ListEnrollments
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: My enrollments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrollmentList'
    post:
      tags: [Enrollments]
      summary: Enroll in a subject
      operationId: enrollInSubject
      x-command: EnrollInSubject
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject_id]
              properties:
                subject_id: { type: string, format: uuid }
      responses:
        '201':
          description: Enrolled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Enrollment'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /enrollments/{enrollment_id}:
    get:
      tags: [Enrollments]
      summary: Get enrollment
      operationId: getEnrollment
      x-query: GetEnrollment
      parameters:
        - $ref: '#/components/parameters/EnrollmentId'
      responses:
        '200':
          description: Enrollment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Enrollment'
        '404':
          $ref: '#/components/responses/NotFound'

  /enrollments/{enrollment_id}/onboarding/complete:
    post:
      tags: [Enrollments]
      summary: Complete onboarding (after diagnostic)
      operationId: completeOnboarding
      x-command: CompleteOnboarding
      parameters:
        - $ref: '#/components/parameters/EnrollmentId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Onboarding complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Enrollment'
        '409':
          $ref: '#/components/responses/Conflict'

  /enrollments/{enrollment_id}/unenroll:
    post:
      tags: [Enrollments]
      summary: Unenroll from subject
      operationId: unenrollFromSubject
      x-command: UnenrollFromSubject
      parameters:
        - $ref: '#/components/parameters/EnrollmentId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Unenrolled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Enrollment'

  /enrollments/{enrollment_id}/learning-goals:
    get:
      tags: [Enrollments]
      summary: List learning goals
      operationId: listLearningGoals
      x-query: ListLearningGoals
      parameters:
        - $ref: '#/components/parameters/EnrollmentId'
      responses:
        '200':
          description: Goals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LearningGoal'
    post:
      tags: [Enrollments]
      summary: Set a learning goal
      operationId: setLearningGoal
      x-command: SetLearningGoal
      parameters:
        - $ref: '#/components/parameters/EnrollmentId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetLearningGoalRequest'
      responses:
        '201':
          description: Goal set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LearningGoal'
        '422':
          $ref: '#/components/responses/ValidationError'

  /enrollments/{enrollment_id}/learning-goals/{goal_id}:
    delete:
      tags: [Enrollments]
      summary: Clear (abandon) a learning goal
      operationId: clearLearningGoal
      x-command: ClearLearningGoal
      parameters:
        - $ref: '#/components/parameters/EnrollmentId'
        - name: goal_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Goal cleared

  /enrollments/{enrollment_id}/study-plan:
    get:
      tags: [Enrollments]
      summary: Get study plan
      operationId: getStudyPlan
      x-query: GetStudyPlan
      parameters:
        - $ref: '#/components/parameters/EnrollmentId'
      responses:
        '200':
          description: Study plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudyPlan'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================================
  # SUBJECTS, CONCEPTS, LEARNING PATHS
  # ============================================================
  /subjects:
    get:
      tags: [Subjects]
      summary: List published subjects
      operationId: listSubjects
      x-query: ListSubjects
      responses:
        '200':
          description: Subjects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Subject'

  /subjects/{subject_id}:
    get:
      tags: [Subjects]
      summary: Get subject
      operationId: getSubject
      x-query: GetSubject
      parameters:
        - $ref: '#/components/parameters/SubjectId'
      responses:
        '200':
          description: Subject
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subject'
        '404':
          $ref: '#/components/responses/NotFound'

  /subjects/{subject_id}/learning-paths:
    get:
      tags: [Learning Paths]
      summary: List learning paths for a subject
      operationId: listLearningPaths
      x-query: ListLearningPaths
      parameters:
        - $ref: '#/components/parameters/SubjectId'
      responses:
        '200':
          description: Paths
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LearningPath'

  /subjects/{subject_id}/learning-paths/{path_id}:
    get:
      tags: [Learning Paths]
      summary: Get learning path with items
      operationId: getLearningPath
      x-query: GetLearningPath
      parameters:
        - $ref: '#/components/parameters/SubjectId'
        - name: path_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Path
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LearningPath'
        '404':
          $ref: '#/components/responses/NotFound'

  /subjects/{subject_id}/concepts:
    get:
      tags: [Concepts]
      summary: List concepts in a subject
      operationId: listConcepts
      x-query: ListConcepts
      parameters:
        - $ref: '#/components/parameters/SubjectId'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Cursor'
        - name: difficulty
          in: query
          schema: { type: string, enum: [easy, medium, hard] }
        - name: include_archived
          in: query
          schema: { type: boolean, default: false }
      responses:
        '200':
          description: Concepts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConceptList'

  /subjects/{subject_id}/concepts/{concept_slug}:
    get:
      tags: [Concepts]
      summary: Get concept by slug
      operationId: getConcept
      x-query: GetConcept
      parameters:
        - $ref: '#/components/parameters/SubjectId'
        - name: concept_slug
          in: path
          required: true
          schema: { type: string }
        - name: expand
          in: query
          schema: { type: string, description: 'Comma-separated: objectives,misconceptions,dependencies' }
      responses:
        '200':
          description: Concept
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Concept'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================================
  # STUDY SESSIONS & ADAPTIVE QUEUES
  # ============================================================
  /study-sessions:
    post:
      tags: [Study Sessions]
      summary: Start a study session
      operationId: startStudySession
      x-command: StartStudySession
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartSessionRequest'
      responses:
        '201':
          description: Session started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudySessionWithQueue'
        '409':
          $ref: '#/components/responses/Conflict'

  /study-sessions/{session_id}:
    get:
      tags: [Study Sessions]
      summary: Get study session
      operationId: getStudySession
      x-query: GetStudySession
      parameters:
        - $ref: '#/components/parameters/SessionIdPath'
      responses:
        '200':
          description: Session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudySession'
        '404':
          $ref: '#/components/responses/NotFound'

  /study-sessions/{session_id}/resume:
    post:
      tags: [Study Sessions]
      summary: Resume a paused session
      operationId: resumeStudySession
      x-command: ResumeStudySession
      parameters:
        - $ref: '#/components/parameters/SessionIdPath'
      responses:
        '200':
          description: Resumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudySessionWithQueue'
        '409':
          $ref: '#/components/responses/Conflict'

  /study-sessions/{session_id}/pause:
    post:
      tags: [Study Sessions]
      summary: Pause a session
      operationId: pauseStudySession
      x-command: PauseStudySession
      parameters:
        - $ref: '#/components/parameters/SessionIdPath'
      responses:
        '204':
          description: Paused

  /study-sessions/{session_id}/end:
    post:
      tags: [Study Sessions]
      summary: End a session
      operationId: endStudySession
      x-command: EndStudySession
      parameters:
        - $ref: '#/components/parameters/SessionIdPath'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Session ended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionAnalytics'

  /study-sessions/{session_id}/adaptive-queue:
    get:
      tags: [Adaptive Queues]
      summary: Get current adaptive queue
      operationId: getAdaptiveQueue
      x-query: GetAdaptiveQueue
      parameters:
        - $ref: '#/components/parameters/SessionIdPath'
      responses:
        '200':
          description: Queue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdaptiveQueue'
        '404':
          $ref: '#/components/responses/NotFound'

  /enrollments/{enrollment_id}/daily-queue:
    get:
      tags: [Adaptive Queues]
      summary: Get today's daily queue
      operationId: getDailyQueue
      x-query: GetDailyQueue
      parameters:
        - $ref: '#/components/parameters/EnrollmentId'
        - name: date
          in: query
          schema: { type: string, format: date }
      responses:
        '200':
          description: Daily queue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyQueue'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================================
  # ATTEMPTS & QUESTION INSTANCES
  # ============================================================
  /attempts:
    post:
      tags: [Attempts]
      summary: Submit an answer (create an attempt)
      operationId: submitAnswer
      x-command: SubmitAnswer
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitAnswerRequest'
      responses:
        '201':
          description: Attempt recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttemptResult'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /question-instances/{instance_id}/hint:
    post:
      tags: [Attempts]
      summary: Request a hint
      operationId: requestHint
      x-command: RequestHint
      parameters:
        - name: instance_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Hint content
          content:
            application/json:
              schema:
                type: object
                properties:
                  tier: { type: integer, enum: [1, 2, 3] }
                  content: { type: string }
        '409':
          $ref: '#/components/responses/Conflict'

  /question-instances/{instance_id}/abandon:
    post:
      tags: [Attempts]
      summary: Abandon a question
      operationId: abandonQuestion
      x-command: AbandonQuestion
      parameters:
