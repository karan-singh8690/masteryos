<svg width="200" height="48" viewBox="0 0 200 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MasteryOS">
  <!-- Hexagon logo mark -->
  <g transform="translate(4, 4)">
    <!-- Outer hexagon -->
    <path d="M20 2 L36 11 L36 29 L20 38 L4 29 L4 11 Z" fill="url(#masteryos-grad)" stroke="none"/>
    <!-- Inner upward triangle (ascending mastery) -->
    <path d="M20 10 L28 24 L12 24 Z" fill="white" fill-opacity="0.95"/>
    <!-- Small apex dot (the learner at the peak) -->
    <circle cx="20" cy="7" r="2" fill="white"/>
  </g>
  <!-- Wordmark -->
  <text x="52" y="32" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="700" fill="currentColor" letter-spacing="-0.5">
    Mastery<tspan fill="#2563EB">OS</tspan>
  </text>
  <defs>
    <linearGradient id="masteryos-grad" x1="4" y1="2" x2="36" y2="38" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/>
      <stop offset="0.5" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
  </defs>
</svg>
