services:
  # ================================
  # Backend (FastAPI)
  # ================================
  backend:
    build:
      context: ./backend
      dockerfile: ../infrastructure/docker/backend.Dockerfile
    container_name: mastery-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql+asyncpg://mastery:changeme_in_production@postgres:5432/mastery_engine
      - REDIS_HOST=redis
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mastery-network
    restart: unless-stopped

  # ================================
  # Frontend (Next.js)
  # ================================
  frontend:
    build:
      context: ./frontend
      dockerfile: ../infrastructure/docker/frontend.Dockerfile
    container_name: mastery-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - mastery-network
    restart: unless-stopped

  # ================================
  # PostgreSQL
  # ================================
  postgres:
    image: postgres:16-alpine
    container_name: mastery-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mastery_engine
      POSTGRES_USER: mastery
      POSTGRES_PASSWORD: changeme_in_production
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mastery -d mastery_engine"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mastery-network
    restart: unless-stopped

  # ================================
  # Redis
  # ================================
  redis:
    image: redis:7-alpine
    container_name: mastery-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mastery-network
    restart: unless-stopped

  # ================================
  # Nginx Reverse Proxy
  # ================================
  nginx:
    image: nginx:alpine
    container_name: mastery-nginx
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - mastery-network
    restart: unless-stopped

  # ================================
  # Monitoring — Prometheus
  # ================================
  prometheus:
    image: prom/prometheus:latest
    container_name: mastery-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - mastery-network
    restart: unless-stopped

  # ================================
  # Monitoring — Grafana
  # ================================
  grafana:
    image: grafana/grafana:latest
    container_name: mastery-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - mastery-network
    restart: unless-stopped

# ================================
# Volumes
# ================================
volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:

# ================================
# Networks
# ================================
networks:
  mastery-network:
    driver: bridge
