apiVersion: 1

providers:
  - name: 'Mastery Engine Dashboards'
    orgId: 1
    folder: 'Mastery Engine'
    type: file
    disableDeletion: true
    editable: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      # Path inside the container. The compose file mounts
      # ./infrastructure/monitoring/grafana/dashboards to /var/lib/grafana/dashboards:ro
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
