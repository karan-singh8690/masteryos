# Redis configuration for the Mastery Engine.
# This is a minimal development configuration.

# Persistence
save 900 1
save 300 10
save 60 10000

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice

# Network
bind 0.0.0.0
protected-mode no

# Timeout
timeout 300
tcp-keepalive 60
