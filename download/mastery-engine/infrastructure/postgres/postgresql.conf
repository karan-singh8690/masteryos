# PostgreSQL Production Configuration — Mastery Engine

# ============================================================
# Connection Settings
# ============================================================
max_connections = 200
superuser_reserved_connections = 5

# ============================================================
# Memory Settings (tuned for 4GB server)
# ============================================================
shared_buffers = 1GB                    # 25% of total RAM
effective_cache_size = 3GB              # 75% of total RAM
work_mem = 16MB                         # Per-sort/hash operation
maintenance_work_mem = 256MB            # For VACUUM, CREATE INDEX
autovacuum_work_mem = 256MB

# ============================================================
# WAL / Replication
# ============================================================
wal_buffers = 16MB
wal_writer_delay = 200ms
checkpoint_timeout = 15min
max_wal_size = 2GB
min_wal_size = 256MB
checkpoint_completion_target = 0.9

# ============================================================
# Query Planner
# ============================================================
random_page_cost = 1.1                  # SSD-optimized
effective_io_concurrency = 200          # SSD-optimized
default_statistics_target = 100
track_activities = on
track_counts = on
track_io_timing = on

# ============================================================
# Autovacuum
# ============================================================
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 30s
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 25
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05

# ============================================================
# Logging
# ============================================================
log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 100        # Log queries > 100ms
log_checkpoints = on
log_connections = off
log_disconnections = off
log_line_prefix = '%t [%p]: user=%u,db=%d,app=%a,client=%h '
log_lock_waits = on
log_temp_files = 0
log_autovacuum_min_duration = 0

# ============================================================
# Performance
# ============================================================
jit = on
max_worker_processes = 8
max_parallel_workers_per_gather = 2
max_parallel_workers = 8
max_parallel_maintenance_workers = 2

# ============================================================
# SSL
# ============================================================
ssl = on
ssl_cert_file = '/etc/ssl/certs/postgres.pem'
ssl_key_file = '/etc/ssl/private/postgres-key.pem'
