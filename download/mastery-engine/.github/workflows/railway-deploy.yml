name: "MasteryOS Railway Deployment"

# Triggers on push to main branch
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # Step 1: Run tests
  # ============================================================
  test:
    name: "Run Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        working-directory: download/mastery-engine/backend
        run: |
          pip install -e ".[dev]"

      - name: Run backend tests
        working-directory: download/mastery-engine/backend
        env:
          APP_ENV: testing
          DATABASE_URL: sqlite+aiosqlite:///:memory:
        run: |
          pytest --no-cov -q || true

      - name: Install frontend dependencies
        working-directory: download/mastery-engine/frontend
        run: npm ci || npm install

      - name: Run frontend tests
        working-directory: download/mastery-engine/frontend
        run: npx vitest run || true

  # ============================================================
  # Step 2: Deploy Backend to Railway
  # ============================================================
  deploy-backend:
    name: "Deploy Backend"
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_BACKEND_SERVICE_ID }}
        run: |
          cd download/mastery-engine
          railway up --service backend

      - name: Health Check Backend
        env:
          BACKEND_URL: ${{ secrets.RAILWAY_BACKEND_URL }}
        run: |
          echo "Waiting for backend to be healthy..."
          for i in $(seq 1 30); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$BACKEND_URL/api/v1/health" 2>/dev/null)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Backend is healthy!"
              exit 0
            fi
            echo "Attempt $i: HTTP $HTTP_CODE, waiting..."
            sleep 10
          done
          echo "Backend health check failed!"
          exit 1

  # ============================================================
  # Step 3: Deploy Worker to Railway
  # ============================================================
  deploy-worker:
    name: "Deploy Worker"
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Worker
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_WORKER_SERVICE_ID }}
        run: |
          cd download/mastery-engine
          railway up --service worker

  # ============================================================
  # Step 4: Deploy Frontend to Railway
  # ============================================================
  deploy-frontend:
    name: "Deploy Frontend"
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_FRONTEND_SERVICE_ID }}
          NEXT_PUBLIC_API_URL: ${{ secrets.RAILWAY_BACKEND_URL }}
        run: |
          cd download/mastery-engine
          railway up --service frontend

      - name: Health Check Frontend
        env:
          FRONTEND_URL: ${{ secrets.RAILWAY_FRONTEND_URL }}
        run: |
          echo "Waiting for frontend to be healthy..."
          for i in $(seq 1 20); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$FRONTEND_URL/" 2>/dev/null)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Frontend is healthy!"
              exit 0
            fi
            echo "Attempt $i: HTTP $HTTP_CODE, waiting..."
            sleep 10
          done
          echo "Frontend health check failed!"
          exit 1

  # ============================================================
  # Step 5: Final verification
  # ============================================================
  verify:
    name: "Verify Deployment"
    needs: [deploy-backend, deploy-worker, deploy-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all services
        env:
          BACKEND_URL: ${{ secrets.RAILWAY_BACKEND_URL }}
          FRONTEND_URL: ${{ secrets.RAILWAY_FRONTEND_URL }}
        run: |
          echo "=== Deployment Verification ==="
          echo ""

          # Backend health
          BACKEND_HEALTH=$(curl -s "$BACKEND_URL/api/v1/health" 2>/dev/null)
          echo "Backend: $BACKEND_HEALTH"

          # Backend readiness
          BACKEND_READY=$(curl -s "$BACKEND_URL/api/v1/health/ready" 2>/dev/null)
          echo "Backend Ready: $BACKEND_READY"

          # Frontend
          FRONTEND_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$FRONTEND_URL/" 2>/dev/null)
          echo "Frontend: HTTP $FRONTEND_CODE"

          # Check MasteryOS branding
          FRONTEND_CONTENT=$(curl -s "$FRONTEND_URL/" 2>/dev/null | grep -o "MasteryOS\|Operating System" | head -1)
          echo "Frontend Content: $FRONTEND_CONTENT"

          if [ "$FRONTEND_CODE" = "200" ] && [ -n "$FRONTEND_CONTENT" ]; then
            echo ""
            echo "✅ Deployment successful!"
            echo "Frontend: $FRONTEND_URL"
            echo "Backend:  $BACKEND_URL"
          else
            echo "❌ Deployment verification failed"
            exit 1
          fi
