# GitHub Actions CI/CD Pipeline for Mastery Engine
# Stages: lint → test → build → deploy (staging → production)

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ============================================================
  # Code Quality
  # ============================================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: |
          pip install ruff mypy
          pip install -e .

      - name: Lint backend
        working-directory: backend
        run: |
          ruff check app/
          mypy app/ --ignore-missing-imports

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Type check frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

  # ============================================================
  # Backend Tests
  # ============================================================
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mastery
          POSTGRES_PASSWORD: test
          POSTGRES_DB: mastery_engine_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -e ".[dev]"
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://mastery:test@localhost:5432/mastery_engine_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          APP_ENV: testing
          JWT_SECRET_KEY: test-secret
          JWT_ALGORITHM: HS256
        run: |
          pytest tests/ -v --tb=short --maxfail=10
          pytest tests/ --cov=app --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml

  # ============================================================
  # Frontend Tests
  # ============================================================
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run unit tests
        working-directory: frontend
        run: npm test

      - name: Run E2E tests
        working-directory: frontend
        run: npx playwright install --with-deps && npm run test:e2e
        continue-on-error: true # E2E may fail in CI

  # ============================================================
  # Security Scanning
  # ============================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Python dependency scan
        working-directory: backend
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt || true

      - name: NPM audit
        working-directory: frontend
        run: npm audit --audit-level=high || true

      - name: Secret scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # Build Docker Images
  # ============================================================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/backend.Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: infrastructure/docker/frontend.Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Deploy to Staging
  # ============================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.masteryengine.com
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying to staging..."
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}"
          # SSH to staging server and deploy
          # ssh staging "cd /opt/mastery-engine && docker compose pull && docker compose up -d"

      - name: Run smoke tests
        run: |
          sleep 30
          curl -f https://staging.masteryengine.com/api/v1/health || exit 1
          curl -f https://staging.masteryengine.com/api/v1/health/ready || exit 1

  # ============================================================
  # Deploy to Production (Blue-Green)
  # ============================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://app.masteryengine.com
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production (blue-green)
        run: |
          echo "Deploying to production (blue-green)..."
          echo "Version: ${{ github.ref_name }}"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}"

          # Blue-green deployment steps:
          # 1. Deploy to green environment
          # 2. Run health checks on green
          # 3. Switch traffic to green
          # 4. Keep blue as rollback target

          echo "1. Deploying to green environment..."
          # ssh production "cd /opt/mastery-engine-green && docker compose pull && docker compose up -d"

          echo "2. Running health checks..."
          sleep 30
          # curl -f https://green.masteryengine.com/api/v1/health || exit 1

          echo "3. Switching traffic to green..."
          # Update nginx upstream to point to green

          echo "4. Deployment complete. Blue is available for rollback."

      - name: Verify deployment
        run: |
          sleep 10
          curl -f https://app.masteryengine.com/api/v1/health || exit 1
          curl -f https://app.masteryengine.com/api/v1/health/ready || exit 1

      - name: Create release notes
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
