# Alertmanager configuration — Mastery Engine Closed Beta.
#
# Routes alerts to Slack channels based on severity.
#
# Required env vars (set in .env.production):
#   SLACK_WEBHOOK_CRITICAL  — Slack incoming webhook for #beta-alerts (CRITICAL + WARNING)
#   SLACK_WEBHOOK_INFO      — Slack incoming webhook for #beta-info (INFO)
#
# These can be the same webhook URL if you only have one channel.

global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'slack-default'
  routes:
    - matchers:
        - severity="critical"
      receiver: 'slack-critical'
      group_wait: 10s
      repeat_interval: 1h
    - matchers:
        - severity="info"
      receiver: 'slack-info'
      group_wait: 5m
      repeat_interval: 12h

receivers:
  - name: 'slack-default'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_CRITICAL}'
        channel: '#beta-alerts'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: '{{ .CommonAnnotations.summary }}\n{{ .CommonAnnotations.description }}'

  - name: 'slack-critical'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_CRITICAL}'
        channel: '#beta-alerts'
        send_resolved: true
        title: ':rotating_light: [CRITICAL] {{ .CommonLabels.alertname }}'
        text: '{{ .CommonAnnotations.summary }}\n{{ .CommonAnnotations.description }}'

  - name: 'slack-info'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_INFO}'
        channel: '#beta-info'
        send_resolved: true
        title: '[INFO] {{ .CommonLabels.alertname }}'
        text: '{{ .CommonAnnotations.summary }}'

inhibit_rules:
  # Suppress WARNING alerts if a CRITICAL alert with the same name+service is firing.
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ['alertname', 'service']
